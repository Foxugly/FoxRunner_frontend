@if (auth.isLoggedIn()) {
  <div class="user-menu">
    <button
      type="button"
      class="user-trigger"
      [attr.aria-haspopup]="'menu'"
      [attr.aria-expanded]="open()"
      [attr.aria-label]="'chrome.user.menu_aria' | transloco"
      (click)="toggle()"
    >
      <i class="pi pi-user" aria-hidden="true"></i>
      <span class="user-trigger__email">{{ auth.currentUser()?.email }}</span>
    </button>

    @if (open()) {
      <div class="user-menu__panel" role="menu">
        <a
          class="user-menu__item"
          role="menuitem"
          routerLink="/profile"
          (click)="close()"
        >
          <i class="pi pi-user user-menu__item-icon" aria-hidden="true"></i>
          <span>{{ 'chrome.user.profile' | transloco }}</span>
        </a>

        <a
          class="user-menu__item"
          role="menuitem"
          routerLink="/profile"
          (click)="close()"
        >
          <i class="pi pi-key user-menu__item-icon" aria-hidden="true"></i>
          <span>{{ 'chrome.user.change_password' | transloco }}</span>
        </a>

        <div class="user-menu__sep" role="separator"></div>

        <button
          type="button"
          class="user-menu__item user-menu__item--danger"
          role="menuitem"
          (click)="logout()"
        >
          <i class="pi pi-sign-out user-menu__item-icon" aria-hidden="true"></i>
          <span>{{ 'chrome.user.logout' | transloco }}</span>
        </button>
      </div>
    }
  </div>
} @else {
  <a class="user-signin" routerLink="/login">
    <i class="pi pi-sign-in" aria-hidden="true"></i>
    <span>{{ 'chrome.user.sign_in' | transloco }}</span>
  </a>
}
